  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0053_WYG_007-1a, image: WYG1098/WYG1098-0312a.png}
body:
  text: 安嶽集卷七宋馮山撰七言古詩送江衍巨源提舉赴闕潼川昔迎公西來益昌今送公北回常平使者豈公志遠地久淹經濟才三年風績不勝頌欲别有贈心胸開江陽夷蠻互讎格邊將生事驚風埃連兵巨費久乃定得失未可相償陪去秋西師出四路欲舉夏冦除根荄精强挽運一蹉跌十存四五良可哀河南數州人封略惡土棄壤如塵灰傳聞敵氣漸衰弱閫外復委將軍裁借將賀蘭作都護戍守尚恐難栽培况今秦人極疲敝菽粟貴重如瓊瑰諸軍零落氣未振肯聽號令傳風雷看唐南詔吐蕃傳往往因循成禍胎太上神明照幽隱廣謀博訪無嫌猜近臣從容合公議忍使漢地生蒿萊關中麥地多不布種每思一飯三四起感慨與語何人哉㑹公還朝方進用不侍講殿歸霜臺瀘南關右飽聞見詎肯戲笑隨童孩對揚上前苟可道願持此語排姦回平生磊落致君意豈慮言出為身災果倅趙衮良弼平江亭良弼作文公昔記滕王閣氣象終天拂寥廓崔皓留詩黃鶴樓今日聲華還磊落安漢城頭有佳處江山清氣歸簾幕少陵無人謫仙死不遇材豪終寂寞蒼苔滿地荆棘生梁棟塵埃喧鳥雀風流賢守一登臨久倚欄干情不薄夜來風月覺澄清天意人心如素約仙葩當見浮空來幾百年來無此作嗟豫好古今白頭到底支離材力弱木桃或見致瓊瑤免對江山負慚怍允南和牛峰絶頂凌雲閣形勝潼江照開廓涪水臺中隱凡菴坐對西山橫碧落頃嘗登覽放懷抱鈎掛軒忩捲帷幕氣酣景熟狀不起一片風騷情索寞充城纍身倦未出無事門亭可羅雀翠筠五瑞掃塵土澄照清風易椽薄平江最好最後到隱几凌雲僅依約屏星主人局閒散長句森森邀我作漳濱病起吟魂耗中散慵來筆鋒弱鏗金入木將奈何手把新篇空愧怍送趙良弼知廣安軍巴黔萬山橫楚封洞庭碧海蛟龍宫潛靈蓄秀天疏通楚人自古多材雄江陵故都當其胸人物蕭爽馳英風良弼崛起聲其中宏偉渾厚如山東才思婉娩春華融論議慷慨無約豐高步壯領轅不容徊翔盤紆巫與嵩拏舟向蜀㳂涪潼嘉陵一曲城古充鷹隼倒臂寧久籠南榮霹靂醒愚聾歸來破裳未及縫籍才檄起如旋篷瞿唐故交復相從始適抱子今皆翁天真逍遙飲量洪世事歷遍詩尤工有時語酣笑未終環顧四坐皆虛空寒飈戚戚凌疏桐去路山逺秋溟濛臨老合散情易攻豈免淚下如兒童髖髀始見斤斧功鵷鸞一息荆棘叢廣安地卑局飛冲席恐未暖行忩忩平時物理相磨礲郡樂不在卑與崇唱酬自可輕開忠無事日夕翻郵筒求劉忱明復龍圖為畫山水晉唐諸公重小筆髙價直與才名俱然多華丹少泉石清格往往人間無至今百存無一二存者真僞難分區營丘李成稱絶迹峰嵓秀拔非常模穆之灑落亦其亞玉堂屏上瀟湘圖董屈許范凡數輩隱隱俗氣藏肌膚乃知山水係絶品筆墨造化非功夫要之文章之緒餘世上真巧歸吾儒益昌臺府少文字見性文室談毗盧龍門雪景生坐隅山潛水奧爭奔趨倚空直幹鬭孤聳緣險古道盤縈紆擁衲禪僧對寂寞擕琴朝士來﨑嶇主人肆筆聊自娛新言默與天機符公家清白傳數世經濟滿腹氷霜壺一言不用輒掉臂五年蜀使甘馳驅時將素毫寫胸臆寧復意外分精粗復古雖清尚許格復古有詩道寧格疑其學許也與可亦壯非燕徒文與可學燕穆之然未至也豈如公思去脫羈束破碎嵩華傾江湖窮冬從公熟窺看愛重不覺聲嗟吁靈峰北菀助蕭爽雪不到地風號枯平生好畫已成僻寧借不喜臨與摹出公門下缺公筆有類客海遺明珠願公乘興一揮灑束絹數幅光芬敷異時解組還故廬皎潔將伴林泉軀寄題榮守岑象求嵓起太博清富樓南榮太守傳詩郵詩題清富城西樓樓中風物略已盡行欲摸詠難為酬憐公謫官不纍意如與萬象同優遊偏州隨分與山水好景散漫無人收昔人知宴不知賞俗氣未斷煙雲羞凌靈把酒獨長嘯歲久此地才風流公帆南國走欲遍聳秀浩蕩皆窮搜歸來耳目殊未厭尚恐勝槩遺遐幽九疑嵓洞識元叟三湘泉石逢柳侯名賢到處適所寓非事筆硯㮴林丘五年留梓恣登覽百剎照水江環州得公新篇似相約正上兜率吟清秋塵中嗜好屑可鄙恨不徑往追公逰他時三老期一笑愛間豈是平生謀送程嗣恭正基提刑赴闕從來貴閥多豪俊失在矜持驕與泰白屋寒門亦有人往往窮愁損英槩得時舊恩報不暇安能與語功名㑹驊騮擺首倦銜䇿一蹶中途為傷駃簮纓要重畎畝壯所養既完發亦大磨礲寶刀挫圭璧更向天資才術外正基太師丞相後學博文清古冠帶天機不露驥盤櫪雲氣雖升蜃沉海平生胸中未一出萬事食間宜少待語默機巧孟軻盜顔色睢盱次山丐世故未能以身徇家聲欲傳道猶在遠别相知試一言不是向人歌慷慨和蒲安行題鮮于秀才羣峰屋背猿烏啼二江門前鷗鷺飛雅聞君居頗竒絶長恨不到心依依仙翁落拓少拘檢解舞石上凌秋輝整冠投袂或云起塵土一踏何時歸和任師中舟中見示經年雅音曠不聞客衣彼此俱紅塵六月赤日火照地仙舟艤在支江濱君年四十已顯官去去榮路無涯津丈夫未死功業在但使道富何憂貧師中詩多言貧故云安嶽集卷七
