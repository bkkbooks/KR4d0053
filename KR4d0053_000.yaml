body:
  text: 安嶽集别集類二宋提要臣等謹案安嶽集十二卷宋馮山撰山字允南初名獻能安嶽人嘉祐二年進士官終祠部郎中山詩文三十卷嘉定中瀘人周鋭與其子澥文集合而刋之前有劉光祖太師左丞合集序及何德固二馮先生文集序此本澥集全佚山集目録雖全而自十三卷以後詩文皆缺所僅存者前十二卷詩耳以徐氏傳是樓書目考之亦然蓋殘本也山與梅堯臣蘇舜欽同時時已盡變楊劉西崑之體故其詩平正條達無翦紅刻翠之態其上金陵王荆公詩有更張漢法新之句序所謂當熙豐間不能苟合於新法者於此可見蓋亦耿介之士故其文足以取重澥當靖康中奏罷李綱宣撫西河又受張邦昌僞命墮其家聲其集雖與山並刻實為薰蕕同器其不傳也正亦不足惜矣乾隆四十四年八月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀安嶽集原序故祠部郎中贈太師安嶽馮公諱山字允南文集三十卷太師有子諱澥官尚書左丞贈資政殿學士字長源文集四十五卷太師卒於紹聖元年左丞薨於紹興十年逺者百二十有九年而近者亦八十年矣而比歲文集始行於世又未有序之者珠玉藏於山淵其氣終不可得而埋蝕斯文也夫豈有久晦而不彰者乎然士之逢辰則有幸有不幸太師公在熙豐間不能苟合於新法辟臺官不就天下高之元祐以來用范醇夫薦始立朝為郎而公卒矣時有幸不幸而斯道也斯文也不與焉左丞年二十三登元豐二年第名聲籍甚元祐執政以賢良方正直言極諫科薦之進䇿與論人交稱焉後不果試教授成都蔡元長待之甚厚及以序送京亦不苟徇也太師卒奔喪京師三年而皇妣卒公嘗自述其衰絰七年中窮居固守等事嗚呼非學而能之乎元符上書論及宫禁述所見耳初非有意於希世取爵祿也其後主國論者自以私意進退人才而公遂進用自郎而卿既乞補外又以奉常召俄上疏乞罷湟州及西寧之役以靖患息民公始得罪矣其謫詞曰頃上書疏半為邪言久懷異心下比流俗遽有羈縻之請實為捐棄之謀以嗣武為勞師以昭功為往失動搖國是疑惑新民可送部與逺小監當尋謫永州别駕道州安置三年而自玉局召為吏部郎明年丞相張天覺罷政公坐附麗又送吏部為處化丞在外將十年然後知夔州復直龍圖閣靖康即位年六十有七矣以徽猷閣待制兼侍讀俄長諫院而女真已圍太原矣故曰時有幸不幸也公老而達實逢時之不幸斯道也斯文也言之抑何艱哉道與時汙隆文與時高下公則心知之故於潼川先生楊祐甫之卒也哭之慟而銘之甚哀公與楊公皆太師公之所作成也其言曰某與祐甫遊垂五十年自少皆承先訓以文學志義相期既而先後得科第中年各欲以所學少見於世而愚不適時自取大戾祐甫雖廢而安處鄉里然疾病窘困不能出門戶而某流放楚粵江湖之逺追維終始𤣥成嘆笑今祐甫卒含悲茹憤言發涕零以吾二人平生契誼之私他人所不得與且所不能知者祐甫晚與成都鄭少世今之鋟木者大瀘周氏子鋭也可謂好事也已其邑人景君佐仕於吾州為周氏子請叙其篇端以余粗知言云嘉定十二年四月十四日簡池劉光祖序父子傳受古難其兼有開於前後莫之嗣作者窮矣故父作子述中庸以侈周家之盛而唐史臣傳李德裕亦首表而出之曰元和宰相吉甫之子夫君臣之道胥貴於纘承者如此而况斯文乎韓昌黎一世儒宗毫端所向變化莫測而得心應手之妙已不能授其子他可知也司馬談之有遷劉向之有歆班彪之有固父子相承照耀一世若可尚矣然三家之子類皆不善用其身君子或慊焉豈文章公器造物者靳之而不畀人以其全耶獨吾宋三蘇先生之出掩千古而奪之氣其文辭渾浩如長江大河沛然莫禦非斷港支流之可望而其名節峻峙又如太山喬嶽巖巖層霄之間使人聳瞻而不敢議父作子述之懿必如是而後可以無愧也彼三家者溟涬然下風矣哉普慈馮公允南以文名於時其子澥承之益大以肆今觀其父子之作敷腴典重不費追琢自合法度非有本者疇克爾里人周君鋭閲之契於心乃鋟諸木俾德固序其首辭不獲命則以其素所感者書焉嘉定乙亥中秋日梧溪散人何德固叔堅序
