body:
  text: 安嶽集卷九宋馮山撰五言律詩詠雪半夜風威壯今朝瑞雪呈徊翔如有待附著不勝輕疊疊雲篩下番番雨簇成雕鐫非衆巧融結似無精河漢潛欺沒乾坤欲混并漫空雖結白觸處已縱橫枯茂全粧出窪隆一槩平參差相掩覆散亂或逢迎逺岫依稀失髙松獨自榮光明通鬼穴肅殺下天兵揮霍偏隨馬慿陵或繞城威稜生劔戟物色儼冠纓樓閣危將墮烏鳶噤不鳴巖封蹲豺起岸斷蟄龍驚地軸猶疑折林梢不易擎穠寒排瘴毒和氣入春耕雖學峨峨勢其如薄薄名暗銷知地暖坐對覺神清交互當門舞玲瓏照眼明味宜茶品試力與酒權爭佳景誰能賞幽吟似有情開樽煩點綴喣筆為題評舊説三農慶量深一尺盈憂民心正切擊缶助歡聲和普守勾士良輔元大夫見寄二首相知思命駕見教每書紳咫尺去無路奮飛嗟此身貪廉雖異操出處幸為鄰肯笑劉郎病前頭萬木春其二溪邊洗俗塵林下解朝紳車馬慵應客漁樵暫寄身置書煩有位釀酒畏比鄰又欲西州去峨眉看一春和眉守周尹正孺端公春逰醴泉捧擁行飛蓋嬉逰立避驄風煙寒食近笑語故人同樂轉諸天外川平一掌中回頭相與愧容易出塵籠和周正孺郡園新霽湖上多幽景囊中尚賜金清尊宜北海嘉節又山隂曉日雲輕放林花水倒沉朅來相伴醉應會主人心和程濬治之祕監贈楊竦中立朝散身似悲鳴驥家如濩落瓢買居悲糞壤數俸怯薪樵夀隱三家近征商百步遙無心隨所寓塵滓自氷銷和吕開少蒙提刑家園茶蜀品固難名家園未有聲曉藍親手擷俗客尚心輕瑞霧吹還合仙風坐欲生因知栽植意留與子孫清和張若愚子發祕丞同年見寄二首歲月磨將老蛟龍蟄未伸文章俱不意功業竟何人孤迹每一轍衰鄉餘幾春扁舟思共濟滄海濶無津其二意氣同歸趣生平幾合離遙懷初得信相喣似忘機世態分難合人情老自知莫將身徇物憔悴變鬚眉和湖州文同與可學士見寄聞乞湖州去交親不與謀京塵收馬足汴水放船頭試茗春歸渚題詩月滿樓散人吟不盡苕霅一溪秋送利漕劉明復朝議中山元魏後數世十三傳皆在河南葬初從代北遷中書謀定䇿環嶲字仲賢魏中書侍郎大理力扶顛坦字寬夫隋大理卿渝國乘機日政會封渝國公唐公起義年議高都尉識玄字深之太宗駙馬都尉名纍侍郎賢竒天官侍郎死羅織獄原武輸期集東阿舊俗悛聚字文秀東阿令河隂才被詔藻茂實河隂令戶部志繩愆符字端朝户部侍郎八子生中葉符有八子崇黽崇彜崇望崇魯崇纂􅀈玕圭崇黽字子長嶺南節度使崇望字希徒左僕射崇魯字郊文翰林學士三台共一躔洪洞城不下玕工待政無前圭昭輔書儀集明宗禮意全太常卿中丞安出處藝祖首詳延學士清臺閣咸平起澗瀍斯文醇復古宏議自摧堅江漢源何巨公侯兆已圓信辭師魯志佳氣尹樊阡祕監花儒將緱山酒地仙看公承逺構發迹向孤騫浩蕩窮經笥縱橫信筆椽巾箱遺紫綬見譜伯仲襲青氈辨論多兵略澄清纍使權鳯鳴雄屏翰鶉首富刀泉詔自南臺下車隨北斗旋鵷鴻思舊侣嵩少望歸鞭師節頻輕仗兵塵未一湔朝綱今省户古道日經筵盡是徊翔地行承咫尺天門施唐􅙶戟冠珥漢貂蟬閥閲誰如此功名盍勉旃慎無從子晉輕去戀伊川因公之志而云子立棲遲久深知義氣然人情嘗歲月物色自風煙士要文章别詩因譜第編碑隂如可附青玉為雕鐫送王求柬之寺丞歸戎州喜作送君詩戎南人物稀文章詹首變錦繡助先歸門卷容高蓋江山照綵衣不須攻錯節雕鶚自橫飛安嶽集卷九
