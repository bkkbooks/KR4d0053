body:
  text: 安岳集巻八宋馮山撰五言律詩寄上金陵王荆公元豐六年聖賢遺陳迹文章隠至神北天開盛際南國起斯人兼濟希先覺公傳襲大醇卑飛隨世俗黙觀養經綸僶俛懷鉛槧􅆦翔表縉紳英聲搖海岳髙歩出風塵去就遲難進謀猷久未伸兩朝雖顧遇大節每逡巡四海傾台輔千齡偶聖辰有為今道德無間古君臣雕琢唐文盛更張漢法新風霆傳信令束縳解生民所志惟膏澤當除亦斧斤寸心勞遠御獨手助洪鈞鐘鼎無前蹟江湖自在身功名非雅意出處自天真鴻雁雲霄勢芝蘭道路春軻雄平可駕房魏淺非倫江漢無良産衣冠竊濫巾才非當世用仕為有時貧銜䇿驅馳久風波出没頻古心終少合老態强難馴名教誰依託文書但隠淪師門常耿耿相府舊循循萬里音容濶諸生氣義均絳紗瞻楚澤白髪倦漳濱鄙俚雖能達精微豈盡陳青雲如可附何處更求仁寄上潁昌范蜀公元祐二年大老歸真主前朝遺數公精神時一㑹出處道皆同起潞儀刑地煩温燮理功及觀光禄表深見古人風聘幣来何厚安車願不東光華膺政殿僶俛就祠宫論議高踰武文章逺繼雄退身無少憾憂國有餘忠几杖誠先覺衣冠為一空千齡重際遇二聖極優崇將相交㳺盛朝廷禮數隆一星容處士四海望𠖇鴻箕潁紛囂外岷峨氣象中楚詞清更適舜律逺相通公以古律定雅樂庭玉連城價孫枝百尺桐聖賢今日是河漢幾時窮晚輩徒瞻仰先生葢始終氷霜嚴皎潔塵滓坐銷融信史知將貴聲詩恨不工東齊如見録光彩附垂虹蜀公和鎮伏承提刑朝散逺貺佳作仍有舜律逺相通之句因復次韻寄呈幸垂采覽盛旦真明聖平生仗至公遭逢不世出覆露與天同諒直誠多勉謀猷愧罔功后王明若日夷夏慶同風喜氣中兼外歡謠北至東敢圖嚴密禁擢處太清宫峻拔山形大高明地望雄起居無忘古坐卧只思忠論樂嗟淪廢求音扣寂空大和非隠伏至理自穹崇曖昧幽還顯卑尊降復隆使人思舞鳯如弋慕飛鴻世事安清謐人心處正中至醇當直詣精義故旁通本自關瑤律還須撫素桐天材由聖作物理要人窮徃古為經始来今是考終云為極微妙襟抱貯沖融斂聚隂陽氣窺觀造化工因君説樂事詩詠照光虹和文侍中錦雞微生非自異翠樾願深藏谷口逢羅􅃠人間重采章全身珠綴絡一項錦成囊易警烏啼早難馴雉性剛僅能逃鼎味何幸識台光黄閣恩優厚青山思𣺌茫鸚言來隴坻孔翠别炎方既獲安棲地寧須憶故鄉和梓漕陳帨誠伯弭節堂妖氛慿絶塞皇武慰羣情並命儒臣起同謀將略明前鋒殱醜虜降仗委高旌拓境新圖展收功寸草横投戈宜偃息奠枕覺澄清廣榭宏經構羣公共落成唱酬風月冷談議鬼神驚錦繡移將合琅玕種即生南方天外濶出師表云今南方已定甲兵已足北斗坐間傾且享憂勤樂除書恐再更閬中蒲氏園亭十詠方湖蒲柳春隂重禽魚晚景多輕舟乘酒去明月扣舷歌清蟾橋石面苔封合波心月照空仙翁行道處清影露華中芙蓉溪野景宜花看秋芳近水多溪流光不斷千尺粉紅羅蓮池疊疊波紋緑搖搖雨氣香菱歌誰與發秋興似江鄉朝真臺聳秀山崗合囘環斗柄臨焚香無俗慮一息見天心白蓮堂平池風菡萏照岸雪玲瓏無限騷人意欄干霽色中涵碧亭日影搖吟筆煙光落酒盃猶嫌池外俗移入鏡中来魚池活水停無滓嘉魚養不驚休言濠上意秋鱠與春羮稻畦物外溪山樂窮中歲月優斯人招不起十頃稻田秋草菴竹影搖金翠泉聲響佩環菴前春日落人向定中還偶成長歌詠考槃洒落正休官愛竹臨溪倚擕書坐石看足煩猶解屨髪禿自忘冠願為無多欲持身到處安溪行野景久不見溪行如有逢長苔梳緑髪淺水卧青龍石出沙仍帶橋危柱半舂日欹猶下馬赤脚洗塵蹤春閒好景雖心賞多情半睡降春聲蜂遶屋晴意鳥臨忩漸老依花徑無機付酒缸人生求適性何苦自樅樅即事二首閉戸塵縁息忘機眼病除就閒因教子臨老更知書擺亞風前稻婆娑雨後蔬窮中方得趣門外已巾車其二舊病花浮眼衰容雪到眉風塵憐客久筋力恨歸遲所得真如夢無厭固巳癡不知縁盡處猶有㡬多時漁翁短棹撥輕舟風恬江上遊機心重浪底生計一鈎頭盡日不多得中懷無寸憂夜深何處宿孤嶼笛聲秋野澗蒼莽長江逈紆囘小澗幽勢尋山脚轉聲傍草根流暴雨沙汀漲清風岸葦秋行行須到海毋為曲灣留和鮮于頃秀才見題小軒一室僅容拙新年尤好閒翻書消白晝隠几有青山人事少迎合英流長徃還此心猶有恨半在史文間和蒲安行誠之見喜新受梓倅故國連芳草吾親在白雲榮歸慙主父虛語類終軍劔閣雖吟戀潼江亦喜聞惟愁良友别分手復何云擊甌樓石上辭人賦城高古郡樓能將天外意冩盡曲中愁湘瑟曾誰聽巴江祇自流倚欄吟月午臨下更遲留龍門洞古洞嵌巖活青山氣象渾應龍常隠處流水不知源鬭險雙峰秀凌虛古木尊怪藤寒覆坐脩竹盡當門混沌誰開鑿雲煙自吐吞深盤通海脉横透露天㾗日影循崖腹泉聲遶石根江前塵不到物外景常存避地仙蹤跡清人俗夢魂功名歸未得囘首謝嵓閽題靈溪寺野寺無俗氣勝遊方此迴水清巴字近僧慧錦屏来秋閣山要平聲讀起溪門竹引開塵蹤不須掃留恨寄蒼苔曲細道中一溪流石色萬木聳山隂地僻有佳景眼明勞寸心墜猿猶掛壁驚鳥忽移林莫問去程遠行人方苦吟巴州聖夀寺小閣危閣已可愛野僧仍見邀灘稀逢水靜城近覺山朝露發秋光潤風吹雨意銷巴童不知我孤興在漁樵廣灘驛寄知縣盧大年職方轉歩異南北一程千萬盤將身試豺虎無路出林巒數屋近相接孤城猶認看囘惶中夜發况守二年官安岳集巻八
