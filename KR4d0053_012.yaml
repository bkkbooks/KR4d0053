body:
  text: 安岳集巻十二宋馮山撰七言律詩寄利憲張充宗司勲曾言英館願重尋猶記當時戀别心千里江山勞客思一年風物又春深夢中花發人將老關外愁生酒不禁引領使臺歸未得且疏懷抱寄知音木門早行白虎前峰數尺髙露華蕭颯滿征袍只知眼底簿書靜豈意山中車馬勞石夾雨餘重按轡草間風動㡬横刀通途聞説無多地踴躍身輕意氣豪送趙悦道叅政大資知越州二首乖崖威重兼之恕正獻純風重以和髙世清名公取盡經邦餘事蜀霑多二江遺愛流長在雙劔銘功壁屢磨聞向蓬莱指歸路其如朝野具瞻何其二徒御紛紛擁劔關蜀人感泣送公還欲知千里謳歌意半在百篇文字間風霰道途方過闕煙霞旌斾更尋山重金不負扁舟約賀老鑑湖春水閒和鮮于子駿逰沙溪洞侁放轡深窮物外天少償逰恨十餘年諸仙羽化曾由此千載巖居尚宛然門轉青溪空水石室存丹竈養雲煙氷骸坐久雖清澈獨有區中世俗縁興州坐卧二仙莫逆真心際混茫豈將生死係存亡已驂雲霧朝丹闕猶蛻衣冠寄異鄉姓氏不傳靈祕録精神長在發圓光洪肩丘袂攀無及分向塵中到老忙寄子駿郎中疊疊巴山走使軺不辭巖險奉寛條頻来馬足行應慣重見民情喜自謠雨過寒林微帶雪風生幽谷靜聞樵清竒定入騷吟筆乞取郵筒寄下僚送李杞省句赴闕使軺西走奉軍期萬貨泉流向武威纔伴江聲關外去又隨秋色日邊歸千尋蜀嶺供吟藁一道秦川照錦衣莫歎奔馳傷浩氣出羣鴻雁已高飛和子駿郎中登高曾對炎蒸憶靜便偶逢佳節思超然相將絶頂孤髙處剰看清秋㡬許天雖欠笙簧留席上猶勝風雨傍籬邊好看菊蘂殷勤别旦暮除書落枕前和子駿郎中文臺地接松扶絶塞邊星居人戸種畬田語音高亢關中俗風物蕭疎劔外天一失覊縻生堡障十分流運費刀泉閭閻謾作封侯計幾輩伻圖到上前和山路梅花傳聞山下數枝梅不免車帷暫一開試向林梢親手折早知春意逼人來何方歸路參差見更託嚴風次第催莫作尋常花卉看江南音信隔年囘和清暉亭亭榭軒忩處處開清暉嘉致號為魁羣峰有景互爭出一水無聲相向来已借寒光搖棨㦸莫辭歡賞費瓶罍新詩自屬風騷將何苦登臨愧不才送范百禄子功學士知諫院二首天庭髙議破羣姦先帝曾將侍從班談笑一辭雙闕去縉紳遺恨十年間傾朝每憶劉蕡對側席纔聞賈誼還言貴逡巡非久計行看鳴玉上鼇山其二聖賢中道意何如歴歴樊川論諌書要在致君成德業不當沽直徇名譽平生忠義傾心際後日經綸試手初得意古人多氣義彈冠應有舊簮裾和苖時中子君運判亭溪道中雙白猿雪白霜猿久已靈江山但覺有餘清優㳺此地不常出皎潔一身能自明髙掛豈知神氣王仰看誰為骨毛驚因吟佳句成遺恨安得風前聞嘯聲和子駿郎中清江道中繚繞川原又載馳人情風物共依依膠舟野水涸將盡捲雨嶺雲寒不飛豈憚長途勞使傳尚尋清景扣禪扉前山次第看梅發剰帶新年春色歸赴辟利臺吕少䝉運判以詩囘贈依韻謝之隨和箧笥號藏珍物理求多漸失真騏驥已勝千里足鷦鷯才寄一枝身自憐蹭蹬居前粃豈意蹉跎接後塵吕亦常作管勾文字窮達聖賢知有分不同非望澤中人和岑巖起莫軒聞在幽軒隠使華合歸清望戴重紗手持温詔方行道堂有慈親即是家得意鄉山頻上看異時蓬島合重誇登臨强欲留詩句苦恨風騷力未加送文與可知洋州何事年年擁使麾放身閒處避危機為思清漢還重去猶厭承明未肯歸天上榮途方䇿足林間輕靄尚沾衣區區斥鷃寧能嘯只得蓬蒿自在飛賞梅呈李待制才元鎮雅牆隂看早梅滿城惟此一株開已驅禽鳥工夫盡才共賓僚宴賞来月照寒姿凌畫燭風傳香蘂墮清杯玉堂深切歸期近少住花前醉㡬囘讀劉賓客外集七言常愛中山好百首猶存外集多大約晩年知性命一時清韻入中和森張劔㦸雖無敵隠約瑕疵惜未磨三遶花欄俱讀盡杜陵囘首鬱嵯峨還楊恬天隠長官家集經世才髙若命何微茫騷雅寄編摩純音已落人間久孤憤猶存集外多喜看仙巢鳴鸑鷟重聞古匣奏雲和殷勤歸秩非無報誰為沉文弔汨羅寄題合江知縣楊夀祺著作野亭野亭何處訪仙翁安樂風煙逈不同千里清泉来塞外四時佳景出山中偷身暫逐禽魚樂放意翻成筆硯工醉伴逍遥無計去鈎藤新熟荔枝紅和吕少䝉題大卿林下軒歸来何處解塵襟幽徑尋軒入茂林身到靜中方有我事除詩外更無心江山相就能清景桂栢新成已翠隂聞説逍遙樽酒㑹三卿魚袋鬭黄金題馮公舉郎中清音亭山水清音遶翠微一亭風物里中稀為憐魚釣生平處還向功名事了歸白傅歌童聊自適莊生鷗鳥自相依區區貧阮長嗟嘆纔有林居便拂衣行縣道中遇暴風雨寄吕少䝉太傅霖潦經時路未通公言行縣太忩忩安知風雨欺人處正在溪山絶險中一出到頭餘日在少留隨分覺途窮却因下馬心方悟欲速無成萬事同重陽寄文與可牛峰秋色翠相摩還上凌雲宴綺羅黄菊縱逢佳節好清歡不似去年多僧房次第依重到霜月蕭條且强歌聞説洋州時節盛不知髙興定如何過永泰文與可宅因寄數程奔走倦征車喜過蓬仙舊隠居秀氣峰巒排戸牖清風樓閣鎻圖書一從高歩東山起重見深秋少室虛無計墨君堂上看林間猿鶴共躊躇聞内舍榜將至元豐内舍初公選開寶中秋定試期四海諸生趨盛集一朝新議破羣疑人傳學榜才張後驛逓家音未到時莫怪虚名隨分喜文章門户欲支持和苖子居新井道中閬水兼山鬭曉光星軺親按古村鄉臨江麥隴煙雲翠夾道林花錦繡香使旨天邊勞按察人情車下見歡康東風相伴行寛詔敢恨年来鬢髪蒼和蒲安行誠之秘丞逰烏奴寺共隨春色探幽竒春到山中未㡬時嘯傲煙霞凌絶頂毫芒人物亂交逵已登高閣臨清曠更羡輕舟泛𣺌瀰落筆停杯遂陳跡莫辭鐘鼓下山遲送李才元待制二首直道﨑嶇出禁林江湖長有愛君心五年漢法更張際千里潼江惠澤深天下鵷鴻方得侣道傍桃李正垂隂邦人不用留行色滿斾薫風入舜琴其二為掾初逢幕府開便將清望屬非才重来門下經年後始見天邊促召囘况有平生餘事業此行高歩脫風埃孤蹤已作溝中斷休費工夫為剪裁李待制寄僧詩有歇定之語兼聞有岷峨之逰因作詩以寄之二首無心宜與物相期既歇須行似不疑出處休將人事説功名多在老成時胸中白練何妨潔足下青雲豈自知好取聖賢權進退莫教輕重失毫釐其二春逰逰盡欲尋山杖屨岷峨只等閒但放髙懷窮物外不知清譽滿人間經年緑野常沉醉幾日香峰暫徃還自笑塵轅盤未得逍遙無路一追攀和普守勾輔元郎中見寄均逸亭詩春風獵獵巻雙旌太守開罇上子城地僻養成山水趣民和流入管絃聲林花逺近參差發野景朝昬次第生引領英㳺歸未得東溪遺恨㡬時平和賞海棠三春花卉滿州城渠占風流第一名老杏酸寒誇錦繡野梨乾强學瑤瓊穠粧雨後頻来看尤物年深特地榮為是翰林親手植莫辭歡賞慰民情翰林彭公思永送韓存寶閤使君常慷慨論兵機喜見韓侯定逺歸將略無窮雖世出秋毫不犯似君稀封侯氣骨青春在報主功名白日飛齷齪簿書何所戀擬投儒服換戎衣和岑巖起見寄一别江臯能㡬時相從鷗鷺久無依樓前流水常東去塞上征鴻又北歸交分每傳雙鯉信鄉心同望白雲飛孤吟長嘯無儔侣惟向清宵共月輝和後唐王仁裕舍人留題自然觀黄鶴仙音久寂然嘉陵江上碧峰端惟餘寂寞煙霞館空老隂森檜栢壇藥竈遶行雲彩動詩牌吟拂玉聲寒虛無蹤跡何須問自有清名不死丹與陳萬石千首詩兼百首文宗韓之子拾遺孫吾鄉此道嗟㡬絶先世餘風喜僅存三變聲名徒自惜平生襟抱向誰論相知惟有貧相見撥置窮愁付酒樽開州道中逢王子嚴中散惠詩依韻和之經年東北望陽臺阻奉從容一笑開良㑹俱從江上得清風潛向坐中来詩成不倦乘閒冩酒好何妨盡醉陪百老篇章今少見滿懷歸去重瓊瑰再和子嚴歸舡才泊古巴臺遙見詩筒眼豁開摩壘只憂輕挑去報瓊何意誤投来老知仙夢終難到清喜英㳺屢得陪對酒孤吟重相憶江前微霰屑瑤瑰渝州春雪青帝雲車碾玉塵隂機和雨付江神巧將清冷三巴景粧出繁華二月春已凜寒威驅瘴癘更流和氣助陶鈞勸農使者雖歡賞猶念無衣索拊循寄仲賢朝議王荀龍大名人巖叟父仙雛曾伴學飛翻三紀光隂一夢間龍坂舊㳺今獨在鳯池髙歩已難攀衣冠每恨功名晩風月誰兼富貴閒契濶人情應見念故人憔悴老巴山夀春穆東美有節亭淮上仙翁倚歲寒遶亭閒種碧琅玕林泉莫恨歸時晩風月偏宜靜處看為愛蕭森從葉宻欲令蕃衍放根蟠階庭已見清隂合更長龍孫百十竿送李之純寶文二首平生玉帳恥論兵勸學儒風已自成惟有愛民常慘怛况曾廉俗舊澄清直將經濟為仁術不假中和助政聲從此囘翔歸柄用更推忠厚福羣生其二邂逅當年最見知台光雲霧阻重披忽聞潁上還朝日正是漳濱養病時劔外江山愁逺别天邊鴻鵠望歸期西南遺愛情何限千載羊公墮淚碑寄題希元承詔堂希元惠詩因次其韻鸑鷟峰前舊隠亭仙翁曾此被弓旌雲山每恨未能到松桂向人如有情公自有詩云庭下松桂栽清隂從此始共把清尊慚北海更聽餘論學南榮何須酩酊為眞賞歸袖瓊瑰已自盈小溪尉丘君父母年皆九十康强精明尚能讀書挫箴如五六十歲人相繼受恩命某固未嘗見也亦未嘗聞也因作詩遺丘君且以傳諸士大夫如果未嘗見聞則宜相與樂道其美而形於歌頌云人間夫婦老難期九十俱全古亦稀滄海蟠桃堪結子碧梧棲鳯久忘歸君恩黄髪頒新誥兒戲青衫著彩衣一尉三公無此樂百年琴瑟在庭闈春逰邀約東風共出城雲容羞日弄隂晴看人牆外衝花氣下馬石間聞水聲林蘖半從樵刄起草牙還傍燒㾗生趂時桃李參差發得意禽蟲各自鳴開謝眼前窮物態豐登時下見民情悔將詩筆隨春酒萬景投懷醉不成戲題辛叔儀花園前載聞君説種花重来軒檻早芬葩只知造化隨人力豈覺光隂換歲華風雨不容孤客賞馨香寧待主翁誇牡丹珍重偏開晩料得開時已到家和馮太博歸州春望聞説巴東暫解顔兩囘曾到十年間咤平灘自古風波險玉洞無人水竹閒霜雪慿虛千尺瀑煙嵐彌望四圍山登臨欲伴春逰去惟恐藤蘿不易攀和八舍弟贊賢司理弟多貧賤之歎故因詩激勸云湖外閒官四見春就中吟咏費精神青山借得風騷古白髪相將意思新每向孤髙雖得意要知閒淡苦無人歸來幸有鴒原識為惜鴻毛抵萬鈞其二兄弟當年粗有聲家風傳得至今清爭先蹤跡雖相讓投老情懷共一驚富貴有時當自致文章無價可能輕期君正在青雲上何止新詩㡬首行再和二首歸来相值故園春坐對春風忽愴神十里溪山依舊好一番花木為誰新青雲功業雖留我白日光隂奈趂人道在不須論用舍惟將時命托洪鈞其二新詩才讀眼惺惺照見詞源徹底清白雪乍聞髙唱喜明珠翻值暗投驚兒童一輩年將晩研席平生分不輕為愛惠連才思好登臨重寄逺山行再和莫厭詩筒来徃頻閒中無物可怡神追囘風雅篇篇好鍊盡襟懷日日新自笑支離多病客更隨憔悴苦吟人陽州不識英雄器重問顔髙借六鈞其二休向詩中恨不平范滂留意在澄清煙霄鴻鵠飛將到雷雨龍蛇蟄未驚聲價得来知道長窮愁消盡覺身輕榮途咫尺非難至俯拾功名在此行安岳集巻十二
