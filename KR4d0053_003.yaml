body:
  text: 安岳集巻三宋馮山撰五言古詩答王載監簿惠詩依韻梓士多好學獨君用心苦始䇿萬里足相期一言遇荏苒去歲月差池晚途路清節撓不變雞鳴任風雨一日起仕進光華照門戸謂予嘗逰從復此再㑹聚清談語言約老筆文字古新詩忽持贈病目駭觀覩蘭芷得逺思從兹識賢矩草木變秋節悲風襲原鹵自可追賦詠何須倦貧窶感慨無俗音虹蜺俟重吐答江安尉鮮于頃野翁寳峯首相聚錦屏袂一判音容阻良覿歲月嗟易換我觀潼江曲君尉瀘水岸到處逢酒徒無人作詩伴南風灑襟袖佳句適我願汶蜀㡬萬里信息偶中斷三軒風雅㑹蕭條各分散孤吟少儔侣衆喙易嘲囋念君同所嗜路近聲可喚唱酬實相眷牽率豈辭憚亹亹郊籍心無為簿書亂送梓漕李竦端臣赴闕道途去無窮歲序嗟易改相知念逺别遇物增感慨悲懽勞寸心喣沬異江海南歸得嘉報迅掉若旋凱機穽觸不發神明怳猶在名因困愈重事雖晩可待去就勿自謀𠖇𠖇付真宰和李曼脩孺職方謝梓守張靖子立龍圖逰春潼川侈風俗一春事嬉逰太守與民樂髙㑹邀良儔年豐廷無訟日夕為歡謀賓從相追隨景物多訪求名園布芳郊寳刹依重丘紅旗肅冠葢畫鼓翻倡優人情殊未央春意亦少留最後司馬至為羅東山羞觀碁緩帯閒試茗澄心幽猖狂但醒醉感慨還唱酬清尊未放手急景如轉頭分司飽餘味經世忘逺憂来時蠶始眠歸看場中麰人生苟適性不羡萬户侯丈夫負壯氣安知餓填溝得志位卿相失時歸田疇紛紛素所輕大半登瀛洲肯為五斗米折腰趨道周區區事筆硯頂踵稱恩庥酒酣且勿去為我新聲謳再和飲酣起擊劔恥從豪俠逰雍容詩酒歡乃是神仙儔風騷固有靈造化隂為謀至音苟同調曠世不可求杜陵思江東洪崖揖浮丘自然風味殊豈特文章優嗟余萬事拙吟咏心久留自愧蘋藻微恐為王公羞晩遇青河公採蘭深林幽脩孺素䝉益百贈無一酬邂逅相撫掌踉蹌容擡頭雖然再鼓衰且免三爵憂見蘭亭故事吾儒學以仕本代親禾麰然多志高逺擲筆思封侯前時征南將驅敵出塞溝詩書非無助爵賞不見疇尚能解客嘲相歡詠蘋洲三術起商鞅一言貴馬周致身果有䇿何地無餘庥肯使韶濩音變作巴渝謳再和予始十五六學賦場屋逰聞君聲價髙已與班馬儔少年取科第復有經濟謀孤聳不世合獨行無名求中道多邅迴病驥盤沙丘起為瀘南守政績稱最優東海尋免歸頴川尚借留慷慨壯士懷肯效兒女羞投紱還故林泉石甘清幽區區尚遺恨君恩未能酬迴首名利場髣髴裁蠅頭君看縉紳士誰為天下憂人情重軟熟要若新炊麰咿喔四至卿峭拔竒不侯一言反覆手平地生重溝世務傷賈誼直道危田疇何當與推移歸釣滄浪洲功名雖難期歲月良易周清風出襟袖散為生民庥無使梁父吟只成髙唐謳苦寒寄任瀘州伋師中嚴飈肅林莽暖日沉煙霏逰子事行邁慘淡凌霜威歛䇿倦脩阻迹徃心自違層雲眺孤鴻徊翔鳴無依雍容念儔侣欲息洲渚非此地正苦寒盤身西南飛馮堯民希元先生承詔堂名因南山出迹為南山止少室價自髙大勞招不起君恩動林壑古道變閭里堂下松桂栽清隂從此始除夕一年倐已盡四序循無端兒女競别歲隨蔬具杯盤長歌感時節却羡僮僕歡明朝四十六重把青銅看幽懷天地有常産貨殖非善謀桑耿發機械已動莫復收割膚啖其口一身相為讎世餒味邪説十九成贅疣興王非管商極治無裴劉獨坐兀坐忩牖寂桐葉擲瓦響哀彈動秋聽逺寄勞夜想擔荷㡬踣面自求不盈掌未躍且自固欲髙又誰奬有作名塵愧屢拂世垢思一澣急索脛已腫虚驚背獨汗窘步裁免跌髙談卒成謾辰去將奈何磨頭髻如彈郊外杖僻走世喧吟靜追古意解巾卧柔碧虛懷揖爽氣漏竹日脚紅出亭山尖翠偷閒興未足遲遲動歸轡城南散雪郊外風含晴霧中日江流淺可渡潺湲弄幽石長堤塵未動逰子念逺適行止慎厥初輪蹄有遺跡安岳集巻三
