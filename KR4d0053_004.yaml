body:
  text: 安嶽集卷四宋馮山撰五言古詩送王審言祕校潞州法曹上黨緣青冥徑氣西北隅黃河天際來草木冬前枯其地號嚴冽燕隴莫與俱氈罽護性命氷霜結眉鬚土人一犯寒斗酒沃始蘇中州宦逰士未秋先嗟呼我聞已心栗凍粟生皮膚而君風雪間徑作壺關趨少年始任氣慷慨若有餘自為功名行不憚氣候殊大戎熾將滅鬱屈迎天誅幕府收英才富貴往何圖埋頭簿書底齷齪終非夫功業彼何人送子誠起豫送張子立龍圖知鳯翔靖公家濟水源闕性愛蜀人公凡五入蜀東峽西峨岷門生變交逰故舊成姻親蜀味皆吾餐蜀音即吾民潼川最後至既至情亦均惡不待公刑善不須公仁雍容如一家笑語聞四鄰山時參公府堊鼻看斧斤舉動出至誠悠久疑為神詔書西出關馬首北向秦遲行客辭家擁别兒戀親公歸且大用顧蜀還無因風收彌勒花雨壓長平塵滑臺為公夀公飲不過唇樂我奉公歡榮虞適兹辰物色莽牢落人情浩酸辛巳辭尚可聽少駐雙車輪送蒲安行誠之祕丞興州簽判春郊散輕靄日出車馬動看君曉裝發送客尊酒重衆人别良易我别情靡共飛纓轉山曲返頸即成夢雖夢去奈何不夢存者多一言起相顧慷慨成笑歌清吟散泉石醉墨蟠雲蘿人生苦汲汲浩如長江波江波西南流君行方北輈林深足豺虎路廢空亭郵處常山中居出亦山中逰不嗟吾道窮每為斯民憂憂民竟何為從事猶俯眉晚達十六七萬事懸難知但窮聖賢意莫賦離騷辭有得常記我以慰朝夕思謝人惠兖墨故人山東來遺我數丸墨握丸大如指盥手重拂拭濃磨向日看古瓦增潤澤經屑不見紙清光隱深墨書云舊所祕聞今已難得庭圭死已久至寶世罕識御府徒僅存人間萬金直兖州擅髙價比歙固少抑古松亦將盡神竒漸衰息文章不見貴筆硯豈可擲牢落况此君雖精淡無色憐君情好古投贈兼以臆世事持此觀噫嗟共冥默送梓憲穆珣東美度支移京西漕剛強多少恩寬厚或太迃峭直病不通聰明至無徒達人固貴全天理常不俱自非藴明識暫解輒已紆穆公淮海英厚重如魯儒疾惡鸇逐雀養民烏哺雛斷獄求以生好善久不渝孰謂公太嚴威姦而惠愚孰謂公太異中異外不殊然猶蔽高潔不肯隨世趨美成固在久巨材期營都西京近日邉漕領出帝俞使權雖云重吏責意已粗財利較圭撮法制環刀殳天聽卑不遺人言紛可虞公心公且明應手萬事無階此將顯用逸驥臨長途山也乏材技盤薄困守株身浮一芥舟業散千金屠衰遲戀鄉曲荏苒歲月徂擺袖不願行俗指爭揶揄惟公最見憐情或昆弟踰每憐沙丘病不作飢鷹呼秋風惜逺别時去迹轉孤飛黃轉騰踏斥鷃甘槍榆升沉各異勢從此忘江湖送梓憲胡揆少卿赴闕富貴一鼎味謂嘗須過食功名萬鈞器負趨少量力不勝苦爾體不厭傷爾臆誰能達涯涘百動靡一息古人去我逺獨公抱清識進退處以道始終完無隙車馬切嚴召江湖正遙憶賢達事如此貪懦猶且惑是豈時俗知聱牙相緘默利漕劉忱明復見性堂鑑蝕磨即明水渾澄斯清雜然外滑銷道在虛中生達哉彭城公養心浩無營一覺自復本妙用皆隨成性通儒佛間大抵寂與誠云見非見故執見流為情名堂雖取相證實不證名文書每叢委賓客兹逢迎二諦本無礙安知堂虛盈優遊寄真賞接引開羣盲登堂一開豁灑然塵勞輕安嶽集卷四
