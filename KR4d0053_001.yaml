body:
  text: 安嶽集卷一宋馮山撰五言古詩幽懷十二首秋風蕭然起喬木葉飛翻徑聲薄以怒肅氣傷無痕洪鈞運不私至義中有恩華滋脫塵滓生意還本根其二嵯峨羣峰高蓊鬱萬木滋一容樵夫手誤落長松枝煙雲慘無色禽鳥鳴且悲人心不為慮山意從此衰其三晚林脫餘照栖鴉上林端危枝不闕足踏踏殊未安相乘狐狸暴寧苦風霜寒微生尚憂患物理幾相殘其四李渤隱嵩髙愈退名愈重區區水南北一呼輒為用沽激本同轍出處或異動善閉不可窺少室有餘頌其五少年氣力壯巾車騁逰歷行人不能到貪逺未有適昔人六十化萬事豈如一誰為持寸光環中照心迹其六髙架環四壁古書浩萬卷腐儒坐相守大義老不斷羣言幾可用吾道一能貫巨賢已經世博士方浩歎其七秋後無多日山中已倍寒蟲聲聞壁腳霧氣出林端農事黃時畢天形碧處寬騷人方適意白露團幽蘭其八吾羮畦有蔬吾飯囷有粟人事少還往山田自充足雞犬盡日間藤蘿照門緑物外乃如此熙熙古風俗其九衆呼楚比死瘈走華氏驚仲尼厄兵守不輟絃歌聲外物匪憂患中懷自險平古人縱天機以道不以兵其十鷙禽出東海矯翮與天鄰初從網羅誤遂與韝臂親一肉戀主意擊搏豈為身飛飛山間雉耿介不可馴十一山溪漲易涸為無千里源桐孫繞雲枝下有百尺根物理不虛發本厚末始繁功名豈易力舊德資深蟠不知所從來意氣行軒軒十二花草弄顔色盛衰數日間富貴無定姿迭起如循環外物偶相附固有不肯還造化弗示私力禦何其艱春意賞花不須折一折春思闌飲酒不必醉一醉無餘歡相知共清賞所屬聊孤彈朝繁坐臨池暮惜行繞欄醒醉無異趣開落同一觀鄰花隔墻悲憔悴枝葉單鄰翁貪酩酊疾起春回殘但知芳菲意常作悠久看送鼎倅陳安仁虞部四言峨峨陽山民資以仁僭陽欺天不需不神而乞於民泱泱沅江城繄以寧橫流潰川不畜不靈將坎於城暴政殘俗劇於懷襄猾胥擾民甚於凶荒借公後時吾民幾亡舞公入城若旱而雨若霖而晴頌公之還孰靈沅江孰神陽山題澧州石門縣蹇周輔蟠翁太博三愛堂石門險且僻人煙萬山罅蟠翁老才望來此屈英駕破漏煩補綴嚬呻索慰藉力致乃坐享少勞豈豐暇臨觀閴無有遊燕久以謝廢園近城邑丘墟甚原壩髙松困藤蔓嘉果沒荆柘斬荒使之出蒼翠若圖畫直前走橋閣當中建臺榭雍容賓朋席左右書史架命亭以三愛作詩盛誇詫韻險語怪絶竊讀驚汗下嗟豫苦羈束相去止數舍深思一登覽若渴不得蔗知君羣公表甫為兵民借復以三者樂何時動歸靶吾鄉富風景草木芬蘭麝錦水清於漢岷峨不讓華蔡圃豈足道寧為耳目乍苟以吾言然煩君少譏罵謝夔守賈昌言禮賓伯樂善相馬相內不相外造父善御馬御成不御敗沙丘有病馬志逺力未憊盤身怯泥土俯首困草稗強起時奮迅悲鳴輒喑噫駑駘倦相逐童僕幾見賣斯人一回顧世俗始驚怪冀北有駿馬散蹄雨雹快去勢馳滅沒朝荆暮燕代銜轡苟庸拙道途足險隘斯人一駷手千里瞬息屆二者豈不偉繄人而否泰相也命所係御也才所賴名馬世常有伏櫪固有待伯造不世出古今重遭會相得互相起兩致一無礙所以馬與人功名各自大與蒲宗孟傳正察推五月熱無事訟庭若掃刷眼底簿書靜獨坐癡悶發上馬出門去不避煩與渴幕中訪賢友且欲紓擁閼灑水延我坐解帶意思活清談破塵滓快若飲氷雪青衫雖同服所處類巾襪道均語言合殊不間毫髮十篇詩總解金玉自磨戞往時草草讀恨不見本末全編使我盡萬漏都一括諸君好詩學論議每相軋破碎失本源十嘗見七八聖途久荒廢憐君力鋤鏺漢安隆中集應和類控楬馳騁氣力壯嵩岱可手揭形容若繪畫譏諷過賞罰回頭索平淡春興最清越意外得真巧漫不露雕割此皆緒餘爾太倉出圭撮豫雖素無聞少小頗姦黠僻澀追古意芬芳慕賢哲獨自狂妄走屢遭流輩喝中道偶成病兩眼痛欲瞎見字輒昏霧恨無金箆刮凜凜憂痼廢那更尋舊扎平生志髙逺縮小僅如鉢又從縣道來屈強且回拔音跋吏責常恐嚇民事日喧聒中煩變憔悴餘憤成嘔噦銜轡脫未去俯首就一秣大呌雖慷慨壯圖已銷殺清華果無分看人起門閥羡君名聲好風誼縱超拔憑陵欲軒翥去勢不可遏然猶滯巴徼官況飽辛辣始初未識面展手思挽撮相值偶相得青松引藤葛意氣始投合底裏盡表察文字本非敵輕舫觸巨筏雅趣均厚薄髙論借迃濶窮中煩慰藉何異魚喣沫俗態重趨走仕路饒險滑且當學鴻漸不能助苗揠窮達蓋有命運轉隨坱圠蓋棺事始定嘗聞古人説功名倘可期因君為尋掇辰陽館辰陽號難理五溪地相跨邉臣重綏撫蠻獠愈驕詐封陲苦侵暴文書困譏罵誰為太守樂一笑不得暇張公抗辰斾烽障幾欲罷偃息有餘地登臨無一舍乃興辰陽館城東兩山胯泉聲落溪谷湖光照亭榭花木親種植朋僚日追迓投壺征虜祭圍碁太傅謝髙風邈難繼維公並驅駕有客嘗一至席參鄒枚亞覽物言思濶醒魂耳目乍欲記傳之久恨無文章價願公賁泉石遊宴日來藉新詩上碑刻佳景若圖畫旦暮趣召還歸為中州詫開州盛山十二題宿雲亭基構白石層風物青山圍野雲戀幽寂長繞軒忩飛梅嶺繁梅照溪谷蜂蝶殊未省巖風莫吹落留粧臘前景茶嶺新萌雨露濃嶺頭春味足緣雲採擷人爭收火前緑流杯渠為愛泉石飲屢招賓朋逰浮觴來不倚一水循環流隱月岫月從海上來清輝長礙山山前愛月人唯看亭午間盤石磴數步即一息始知登山勞盤盤行徹時迹與心俱高故盧沼中虛得嘉名水清石環環天邊侍從人來照氷雪顔琵琶亭片石胡琴槽構亭事登臨考功間中樂非好世俗音桃塢聞説舊桃塢歲久無殘枝春光已不到猶有風騷知繡衣石榻御史來山中拂石當優遊非人勿據兹恐為山神羞上士泉瓶為愛禪翁逰潄泉聽泉音何當酌清泠洗我塵垢心竹嵓倒影蔽山骨引根出嵓腹誰人萬仞間團團種青玉和程之才正輔感遇天理貴自然枉直各有病人情隨所得是非本無定此身寄軒冕心與萬物競低回就銜䇿跳踼落機穽巧求固為纍矯枉亦過正持之有原本出處一以靜所守以吾道所安以吾命不驟窮馬力不決暴虎性富貴偶而已勿使憂喜並感遇難我知無言為心聽安嶽集卷一
