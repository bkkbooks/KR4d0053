body:
  text: 安嶽集卷十一宋馮山撰七言律詩黃甘寄李獻甫果山多果遍林丘惟有黃甘格最優繁結幾經秋雨熟完滋宜帶晚霜收霞餘點綴青林逺星散玲瓏緑葉稠秀色盈衢爭委市穠香浮水半通舟金苞爛漫差三等乳蒂龍鐘占上遊一宴嘗珍皆絶品萬錢要平聲價或輕酬盤筵皎潔如圓蓋梨栗粗凡似贅疣藴藉佳賓欣共賞芬芳醇酎雅相投殷勤食指嘗先動顧盼饞涎已自流花瓣瓊瑤紛落爪雲腴氷雪冷侵喉蒲萄鎖碎終非匹荔子肥甘僅可儔但效兒童貪磊落不知牙齒怯颼飀力蠲消渴多年病清釀騷吟一腹秋屬饜且行猶掌上悶餘雖卧亦床頭膚輕漸平聲密衣猶重種好懸囊子尚留憔悴瀼西三寸小酸寒東望一枚休柳均奴僕知郎貴橘類砆砥比玉羞美實舊嗟遺貢禹嘉名今愧下溫州多栽厚利羸梔茜一熟經時汗馬牛晚歲幸為安漢守眼明重到洞庭逰已將滋味千時好寧免苞苴徇世求大嚼有誰能快意素飱無事却成憂徐陵奬識詩辭古胡濟矜誇賦筆遒願得新篇聊假借庶幾聲望出遐陬送宋構成之運判赴闕曾留先帝紫宸班髙議雍容數刻間使節光華金口賜公登對移數刻面奉聖旨除擢監司差遣鄉枌歌舞繡衣還爐錘應手皆良法斤斧投虛輒大姦坐席賢勞殊未暖歸軺嚴召遽難攀豪曹自是青雲器騏驥應無白日間蘇孺故人聊養拙君公行部每開顔新知邂逅情猶在逺别逡巡涕欲澘人事去來寧可問試看莊叟道中環送徐之才赴洋州三河使指皆精選八座郎官最上逰袖手看人趨要職息肩隨分領偏州遐方暫屈嚴明府舊部爭迎郭細侯常愛昔人為郡樂不妨循吏與民休枌榆指顧秦川近臺榭周環灙水流闕下子牟心感慨天涯賓客老淹留方將振羽趨庭鷺豈便忘機狎海鷗青漢繞山迎隼斾北風吹雪犯貂裘從來恩館深仁遇依舊鄰封竊庇庥逺别不惟思酒盞相忘何事更書郵郢中無和陽春曲時寄新聲欲強酬和劉明復鐵老君觀放轡逍遙物外情登真一境照人清巍然道德玄元像傳得胚渾太古精造化工夫應默運神仙儀相自隨成江山地勝空遺迹聖智長存即久生寂寞黃冠猶好事微茫丹竈不知名淮南英胄來瞻仰驟起清風化蜀氓寄潭州何正臣君表待制二首繡指初從劔外還文章開府冠羣仙忽聞五管傳邊警又出三湘領使權偃息湖山非久計翺翔鴻鵠待殊遷不同宣室因循召台輔明時屬少年其二髙卑鵬鷃分難攀豈意相知邂逅間北海舊時曾薦鶚愚公終日尚移山平生泯默無他技一顧差池已厚顔猶有功名心尚在爐錘當手待公還寄上范蜀公二首去就人兼衆美難侍郎高望肅衣冠每尋當世羣公議更在清流絶等看楚屈辭多誰謗國漢疏名重只休官求仁已得無餘憾自向冥冥著羽翰其二拱極星文動少微西南風物重光輝平生親友傾心望共慶功名畢手歸車馬歡聲傳里巷松楸佳氣雜煙霏長卿兒戲揚雄拙未足公前較是非蜀公和小馬輕輿蜀道難身披裘褐頂峩冠已從林下幽人往猶作朝中舊德看漁釣喜歡新得侣道途瞻顧尚呼官多慚鄉友貽清唱天外鸞音與鳯翰其二常望鄉山憶翠微此來時節更春輝林間怨鶴久招隱花外啼鵑仍勸歸雲似隨人飛縹縹雨如先道灑霏霏回思仕宦平生事六十三年始悟非寄上北京文侍中四紀三朝會遇同陪京猶望節旄雄欲知元老經綸迹盡在生民鼓舞中漢府重歸黃閣相商山難訪紫芝翁陶鈞末士慙無報惟解聲詩寫至公和東川吳幾復辨叔朝議見寄幕府參差恨莫追公車才下我親闈髙談乍聽曾心死前會難尋但肉飛千里有時重咳唾一言何處盡精微惟思旌棨趨嚴召雙劔西南望落暉和陳圖南道中見寄故人重見老相看江上秋風已薄寒曾約浮沉俱里社豈期僥幸亦侯籓休嗟華髮多年别且喜清樽數日歡惟有舊逰難得處風騷遺恨滿三軒和李獻甫見寄别腸回轉似車輪千里相忘一水濱自愧卑飛徒衮衮過蒙髙義最恂恂已違蘭養三經歲猶恐瓜期再見春趨府何當聽約束分為膏澤與鄉民蜀中四路皆謂之鄉里和朱牧宣德英遊相聚日相歡休唱還家蜀道難為愛尊前文字飲不知門外雪霜寒酒酣依約羣仙夢談劇飛揚巨海瀾從此追隨頻語笑莫教憔悴恥儒冠運使李獻甫有書云千山萬水之間泥濘勞苦不可勝言者因以詩答之使車東按宕渠還霖潦千山萬水間為把仁恩行郡國肯教愁色到容顔髙賢本為蒼生起良驥應無白日間從此促歸天上去翺翔鵷鷺紫宸班送梓憲鞏彥輔中散二首宏才髙望出簮裾尤向持平意豁如輦轂聲名三輔最西南恩惠十年餘諸公每恨歸朝晚美職行聞半道除今日老成應不次中臺煩劇在刑書其二繡衣三峽始歸來孤迹青天道上回牛馬經年馳使檄雲霓終日望行臺鵷鴻去勢看千里桃李遺芳占一栽都邑羣公如見問漳濱衰病已難材和知資州許廣淵澤翁同年朝奉見寄每思同榜多零落忽見新篇慰寂寥今日抗塵俱白首當時聯翮共青霄休嗟逺地猶沈俊况是深知已滿朝飢渴未能親一笑祗憂嚴召促歸軺和周正孺逰醴泉寺蠶叢衰遲猶有少年心十里名藍共訪尋抹緑郊原逢雨後殘粧桃李覺春深喧譁歌舞隨流俗瀟灑溪山憶故林一醉不辭繁上酒簿書回首費光隂和周正孺春逰路入江村五馬逰江邊生俗弄春毬客愁無地時分請樂看能俳預點抽趂賞不辭花欲老勸農偏喜雨新收經年多病無歡意強逐雙旌一舉頭和李曼修孺戶曹青雲回首即紅塵且向卑官事隱淪衮衮泥途方索足區區天地不容身前頭功業安知命滿腹文章未稱貧深愧相知空握手羽書邊上輟嘉賓和徐之才回紋行軺使指屢襟分路去重看思糾紛清夜峽前江照月霽天郊外劔橫雲情多苦近歸褒漢景物應難會見聞榮慮俗緣因刺按燕堂虛愧有移文見聞二亭和劉涇巨濟教授卷地嚴風動馬蹄忽聞投館到雞棲路隨黃鶴翺翔逺詩壓青山氣象低我已衰年思故國君方高步陟丹梯遲留且伴臨江醉剩聽清猿峽口啼和吕少蒙蠶市何處青衣舊俗酣峨嵋東畔蜀江南從來歲首爭為市大半民間已不蠶幾日笙歌常繼燭晚春桃李尚仍藍嬉逰果獲神明助太守雖貧亦薺甘公庫迫而春蠶叢燕逰之費為多故云往時與今錢唐蒲資政傳正修史鄧內翰溫伯同和唐韋考功張水部盛山十二詠畀開江吳令使榜於宿雲亭二十三年矣因緣登覽感慨疇昔復為短篇以紀故事元祐二年正月二十八日安嶽馮允南曾繼唐賢舊唱酬宿雲亭傳為遲留韋溫石上尋遺迹蒲鄧天邊憶俊逰亭榭寂為間處所溪山清帶古風流神交冥漠相知逺重把狂吟此暗投中巖封崇寺在雲安上三十里萬竹林間一徑升滿巖金碧靜香燈飛泉散亂垂千尺危閣欹斜擁數層雨氣或從簷際落風光時向坐中凝荒碑文字那能讀合眼煎茶問老僧扶歡驛王衮居也梁承秀居今隆化縣李光吉居今榮懿寨皆土豪犯法禁以取夷滅僭田收盡連蠻徼舊版從來實漢民草染華風能不瘴山離汙俗自無塵連城解喪吳王濞巨積終刑石季倫一代英豪猶不免咄嗟三叛爾何人三家兄書報薦起樓屋喜而有詩臨街樓觀百餘年司馬辛勤五世傳凡在子孫俱肯構敢憂門户或先顛亢宗本是先人意幹蠱成於伯氏賢他日舉杯相屬處為留書閣井東偏寄陳蓬州圖南臨老蹉跎來劔閣故人留滯在蓬池光隂一别六七載功業半生多少時謫宦可憐嗟子駿徑歸難學羡誠之何當江上重攜手同到三軒看舊詩和鄧溫伯二首不獨髙文耀世竒曾將宏議振天維誰人才術能爭首自古功名貴及時暫别鵷鴻蓬海上少留旌斾蜀江垂西州筆硯雖衰落會有中和樂職詩其二虛譽交逰共借推清途俯首倦重窺方將素志隨鷗鷺敢拂華巔望鵔鸃衰晚欲成漳浦病嗟矜猶得鄭公詩相逢少置升沉事且把金蓮為倒垂送鄧溫伯長羡橫飛霄漢逺多慚窘步路途窮如何會合青天道俱是衰遲白髮翁萬里每嗟音信絶一樽還喜笑言同遨逰莫作經春計佇看髙旌促召東和劉漕明復觀吳生畫普城紫極觀古觀蕭條昔未名却因吳筆助神靈能將萬化豪端意寫出羣仙物外形俊逸狀如裴劔舞周環時見蜀山青隂兵聳動驚魑魅真仗飄搖擁戶庭按部每來除枳棘題詩留與禦風霆因嗟畫癖無由見魂逐車塵為一經和題成都諸公唱和集諸公髙詠蜀人編唱和舂容近百篇厚重江山藏古氣軒翔雕鶚在秋天不徒神物隂相護兼有風謠樂共傳誰謂開州新集好退之題後始完全和劉明復再遊劔州東園二首孤城寥落萬山圍惟有東溪景最竒擁傳使華尋舊賞滿園春色待多時援琴故故彈流水隱几蕭蕭聽竹枝擺脫風光情不盡停車門外欲行遲其二危亭飛閣照寒溪重到依然杜宇啼好事且看韋守記補亡思覔義山題頻來已免山移誚久坐翻為水樂迷一宿有情非雅素他年嵩洛是真棲和徐之才喜雨憫雨何須事禱祈霈然未足便晴暉潤通壠畝麥禾起香遍園林櫻笋肥浮藻水生魚聚戲落花泥熟燕交飛民謠已洽豐年望惟恐使車將北歸和徐之才觜體菜蔓全除看緑槐木隂穠合乍聞雷田間雖荷沾濡澤水際先憂蕩溺災火氣已隨妖熖出山光尤喜晚晴開門前雅致無餘事惟見詩筒競往來寄新先輩蹇頎子長書記年少才華自不羣果然飛步出儒紳漢廷大對無雙手聞子長纍考中狀元蜀學巍科第四人吾蜀李公素楊元素王宣義與子長皆第二人也暫屈鵷鸞棲枳棘行看雕鶚離風塵東川佳氣因相待共作榮歸晝錦春將過益昌先寄允南使君楊夀祺衮衮京華志氣低歸心長伴日輪西蒼顔白髮困新選明月清風思舊溪屈指光隂時節晚舉頭霄漢路岐迷巴陵太守應憐我凖擬經過醉似泥和楊夀祺承事見寄道屈文章價不低誤傳新句落天西忽聞命駕趨雲棧猶憶同舟上井溪爭嘆科名淹舊發誰憐簿領困沉迷相逢且約嘉陵酒為洗關中數尺泥送苖子君運使赴河東漕二首聖君宵旰尚憂邊移領并汾將漕權漢使已更三數節公出使為多三數時因邊事而云壺關才下十餘年民情姑息方師後兵計從容試上前卿相通途從此致橫飛雕鶚上秋天其二一顧生平於我厚十年門下見公親祗知談笑無難事誰識襟懷似古人遽别未遑論出處相看何用惜沉淪清朝勳業誰相問已向籓籬託此身寄李獻甫運使江淮勳績已優殊重使西南出帝俞被澤民謠千里逺望風邊事十分無文書頃刻隨談笑騷雅雍容命僕奴旦暮即聞嚴召速扶搖三省上鵬圖獻甫和寄半生才命苦差殊肯更詩窮效聖俞清識豈期回顧盼嘉篇聊用借虛無鄉心歲月疑如夢官况塵埃直未奴聞説南充風物好未能歸去且狂圖和趙良弼初秋即事尊酒相看白髮翁重來寧復問窮通十年舊事資談柄一篋新詩載古風楚客逺行經素節蜀人歸興羡冥鴻登山臨水無多日且伴間中説苦空甲子鹿鳴燕上呈諸秀才二首詔書天上頒春澤經義人間沸海濤俊秀一時隨品藻文章萬選即英豪溟鵬乍見摶風起郡守寧辭勸駕勞當有竒才為時出中元佳氣似嵩髙今年中元節旦於郡城之北有竒雲數千峰凝然不動如遇雨而望嵩嶽也其二重陽髙會最風流為禮賢書席俊逰已愛食萍歌小雅更宜攀菊賞清秋榮觀坐見邦人喜壯志行期國士酬酒到從容當盡醉登仙名籍在瀛洲重和四首此與趙良弼酬答羣俊爭求一字褒諸公清識晉山濤蓬仙寥落誰人繼史筆縱橫自古豪勝爵頻傾知得雋劇談無極坐忘勞勉行無負題評意東蜀斯文價已髙其二郡筵瀟灑宴清流疏懶相從伴奐遊但喜狂歌猶應節不知衰髮已傷秋多情共把金英看厚贈慚無玉案酬未去且為詩酒會蕭蕭休詠白蘋洲其三整此笙歌散鬱陶雨簷飛瀑㵼秋濤吟情徹骨清尤健飲量隨人喜更豪黃菊光容嗟向晚哀箏言語恨徒勞相逢宜共冥冥醉回首青雲路轉髙其四年少相看自輩流深知惟喜舊交遊休言白髮參差老只恐朱顔次第秋歡笑且從今日起功名能有幾人酬逍遙不必分髙下鳬雁翩翩蘆葦洲和陳興州見寄音信昜傳臨一水道途相去隔三州何時樽酒同為會無補篇章約共休鄉思豁從歸後少貪心宜向靜中收此情惟有君知我不羡人間萬户侯戲謝趙良弼寄薏苡山藥􅗰珠舂出真珠顆山藥鍬開白玉團本草經中俱上品故人書寄善加餐輕投已獲琅玕報每飲兼資菽水歡欲把長篇酬厚意吟腸無味苦搜難問江巨源求茶語笑嘉陵醉别辰曾留一角建陽春不將間碾無佳客每到開嘗憶主人蒙頂縱甘餘草氣月團雖有隔年陳吟魂半去難招些願得蘭溪數片新公家蘭溪每春建溪至輒馳僕五六千里送官上謝李獻甫寄鳯茶雙鳯婆娑緑玉團初綱猶怯禁中寒貴從侍從時宣賜傳到西南作寶看旋碾合留清浩氣親題何事寄粗官感公珍惠寧須試一嗅煩懷已自寬再和此品何嘗下小團分甘仍值雪霜寒恐塵竹葉微蒸過要細銀杆旋碾看紫盞烘時愁俗客清風來處屬仙官平江一啜吟佳句起舞不知天地寬和李曼長官約逰郊園其弟殼亦有夢草堂郊園聞葺舊亭臺曉訪氷鬚凍結腮野景豁從江上見雲扄深向霧中開早知間處登臨好何恨忙時取次來夢草新詩酬不得謝家兄弟盡清才和李獻甫雲頂舉首看山不到山每來留恨翠微間禪關但有經年約使傳終無一日間春到柏林香渺渺雨餘巖漏㵼潺潺虎溪莫過虛邀客猿鶴鐘峰悵未還和鮮于頃節推惠詩英駕能來慰寂寥相看衰鬢共飄搖風騷會裏多年别談笑杯中萬事銷休歎轅駒方局踳不知籓鷃已逍遙如將巧思鳴孤憤為我商聲更一謠下黔江﨑嶇才喜下荆岑一水奔騰萬石林使節敢辭重險阻客舟將命寄浮沉可憐幽竇非人境猶有清泉慰我心勞逸賢愚寧可問但嗟衰晚愧臨深和王子嚴南平道中寄示雨隨行色過重闉路有思歸送别人未省幾時趨北闕且同回首望西鄰嘗同在梓黃花漸近羞重見白酒猶期醉一巡三峽苦辛嘗欲遍置杯休要問澆醇寄賀李修孺移利憲才出關來又入關欲間天意未教間一生孤直知心處三度交承隔政間食蔗羡君方有味過屠憐我尚何顔功名不是蹉跎物猶惜清時共仰攀牟仲甫作雞終有意趣為豫寫鬭雞矜驕自得猶有餘勇因以絶句題其畫云忘身為利得忘形棄彈莊生只自驚嗟汝虛憍氣方盛何時全得似無情安嶽集卷十一
