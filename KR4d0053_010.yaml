body:
  text: 安嶽集卷十宋馮山撰五言律詩效皮陸體藥名詩寄李獻甫半夏勞奔走當歸計未成向烏頭雪白雖逺志澄清白屋逰偏早青雲夢數驚預知皆係命無患可傷生泉水懷鄉國靈仙得古城萎㽔差病力安息愧民情蘭草園池靜槐花道路平野翁宜散誕故紙任縱橫問話思黃葉論文憶長卿餘糧添瓮盎亂髮散簮纓紫蒨江山秀婆娑桂柏榮楓香餘雨氣桐葉變秋聲險語嘗鉤吻昏瞳屢决明鸕鷀閒自酌琥珀向誰傾莨宕官資淺螵蠨活計輕每將蘇子校多謝使君名滿把黃金屑知音白玉英青箱空聚古敗將敢論兵苦練詩方就旁通筆未精前賢如及已海藻願題評道中詠懷奉寄利州允南使君鄧潤甫交印夔人國分襟汴水堤十年難㑹合一夢頓乖暌官序潘生詘詩文庾信齊諸公多汲引憲府屢提攜不肯乘驄馬那能出寶雞安恬輕世味灑落見天倪照物聰明浹為邦問望躋笑談清岸獄暇豫勸耕犂不忍為鉤距何嘗設町畦燕堂傳夜燭遊轂碾春泥衆服題鸚鵡疇將食駃騠草黃思隼擊梧碧值鸞棲欲問無來使開編有舊題君方安玉壘豫亦逺金閨地隔江波濶書傳鳥翼稽豈知雙鬢白相見兩當西內顧微他技殊私牧逺黎辭親愁不斷叱馭意空迷吳苑飛雲杳秦城北斗低南山千里雪劔閣萬盤溪夜宿星邊驛朝行石上磎深疑窺地軸高駭躡天梯看岫時欹帽聽泉或杖藜蕭蕭黃葉下䮍䮍冷猿啼蜀道無艱險人心慢慘悽永懷持從槖遙想綴朝圭直北瞻天日征西疊鼓鼙相期郡齊冷清話看揮犀和新成都知府鄧潤甫溫伯內翰道中見寄與鄧奉節交承畫舸秋離峽長江水齧堤郡樓高送别客袂摻分睽前後聲難繼升沉分不齊私心常有待得意幸相擕千里聞鳴鳯三年倦割雞一哀纒性命萬事錯端倪英俊聯翩起清華直上躋平生依筆硯俯首失鋤犂同嗜飱秋菊忘言病夏畦精粗分玉石去住即雲泥近列多鴛鷺誰人享駃騠徊翔趨鳯閣隱約駕雞栖訓誥資溫潤衣冠出品題風流清憲府威鳯肅朝閨戲彩江湖樂觀濤歲月稽還朝垂拱北易帥華陽西舊德傾中外歡謠浹庶黎忽聞旌􅙶近頓解簿書迷一笑何勝喜髙談為少低長篇追杜老餘論及曹溪把酒聽新闋尋山傍小蹊欹斜行疊嶂空曠上危梯拾掇留樽俎蕭疏愧糗藜故人難㑹遇壯士合悲啼物理紛無定年華去可悽王師行解甲盟府重盤圭劔外聲文鐸關中息戰鼙時清數相見寧望胯金犀和鄧內翰逰烏奴寺萬險初離峽三程未到關相歡才把酒偷暇更尋山古意登臨外人生笑語間一茶逰興盡簫鼓欲催還和徐之才雪農事方春作田苖待雪催忽從天外降尤勝臘前來枯槁全粧飾勾萌暗養培格清徒自照體弱不勝挼有勢離還合無情去却回乾坤迷境界造化始元胎氣凜侵帷幌身輕寄草萊匿瑕漫糞壤銜巧綴條枚空際如難集毫端已共偎濃寒流逺蜀嘉兆叶清臺既渾山兼澤寧分石與瑰飢鳶蹲木杪凍虎卧巖隈積恐江城滿重疑棧閣摧誰居梁宛右或遡剡溪洄凝泫隂雖勝沾濡旱可推雕鐫窮物象皎潔離風埃雨腳紛猶雜雲頭重不擡豪門張燕席貧竈擁寒灰且喜䝉膏澤仍知免沴災斯民爭慶賀高㑹與歡咍把酒看宜醉洪爐守至煨傳聞詩句好罷聽樂聲嗺灑落吟情健玲瓏霽色開營丘無復見誰為寫皚皚和徐之才浮萍瀟灑春容靜飄搖水性柔根從何處起身任此生浮得地輕依託隨波旋去留潢汙深不采溟渤望空悠花蘂看還落蕉心久未抽豈知經夜雨便欲障江流晚入吳歌唱晴邀漢女逰翠連芳草渡寒映緑楊樓碎剪神工巧平鋪澤國幽微軀焉足道浪跡更誰收踏破閒行鷺衝開暖上鰌但能知委順何用校稀稠謾欲通河漢寧虞踐馬牛迸從菱芡密如把芰荷揉寂寂苔成陳紛紛芥作舟屈騷遺故事湛賦壯前猷蛙躍沾雙股龜行蔽六眸聯居如有守逺近亦無求别浦千重恨吟塘萬㸃愁生涯隨所寓細域浩難籌野色宜茶竈仙姿泛酒甌清芬傳澗沚餘思滿汀洲暗與蓴絲結多為荇蒂鈎豈專嬉雁䳱自可覆蛟虬助賞名園側含悽古道周紆回差勝梗汨沒尚憐漚赴急如趨市逢枯類轉溝吉祥興霸業美薦格神休為愛常青眼難題幾白頭新篇盈巨軸牽强豈能侔和徐之才巡按見寄捫參趨逺道首蜀下青泥江繞縈紆帶山盤屈曲梯何時巖腹斷自古客心低峽盡逢寧武天寬類寶雞東窮巴嶺北南轉梓潼西地共猿猱食居同鳥雀栖風霜傳一檄玉帛走千蹊力責多傭父窮輸或嫁妻上憂分使節僉議輟朝圭素志施膏澤虛懷去町畦垂鞭防馬憊含哺止兒啼夜寢無寧席朝飱或茹梨驅馳宣詔令歌舞慰童齯按部經雙劔迎壺滿見溪政清氷出凌民附水淫堤指穴收毚兔搜羣去狠羝吏悛藏乳虎人樂戲春麛驛轉悠千里秋霖動一犂憂勞如有病暴露欲生黧委篋書爭報封囊藥自題茶塵思鳥觜羮野憶駝蹄過雁晴逾呌殘蟬曉更嘶萬愁休入耳數酌且溫臍聖治幾仁夀宸衷念庶黎呻吟裁藥石亢旱得雲霓駒有苗場食鸞無枳棘栖明公深履歷清望絶乖睽盤錯居常試安恬久自迷漢貂方促召賈論息言提寶閣鄰天仗星闈侍女奚功名當少俟歲月尚能稽末路欣依託先期慮解攜榮封雖絶迹歸意共含悽自笑身謀拙曾將物理齊倒行嗟黽勉仰望局攀躋易足籬邊鷃難馴水上鷖稻粱誰計鶴車馬未安鼷詩戰逢諸帥文聲鼓萬鼙白徒雖自奮黃馘豈容批怒臂猶輕展驚魂已暗擠續貂無取者附驥亦榮兮巧拙其如性天機不可倪和徐之才宿孔溪亭驛早行一云和劉漕孔憂寧暖席劉髀不禁鞍夜永無歸夢山深正苦寒行鉦催早發晨鼎薦芳酸誰識驅馳意憂民萬事端和徐之才春晴偶成句皆雙關雲容收雨意草色妬花妍詩苦是真樂酒醒方爛眠園亭無限景笋蕨不論錢耳目因成僻江山似有緣寄高梁守勾輔元北按經時出南歸計日趨幽花明澗水細雨潤春途就歇開新醖催行趂早餔故人休問吏相見且歡娛發新安驛偃蹇隨雞起衰羸索酒扶風鉦嚴道從霧燭轉﨑嶇迎馬開熊幟環舁簇虎殳山中耳根靜清曉厭騶呼武侯廟四百源流盡三分氣𦦨高西州稱險隘𤣥德夸英豪統正圖王䇿關張汗馬勞相雄爭勝負所得僅􅊏毫當世安危慮斯人智識滔潛身規去就擇主事逰遨仗順親歸漢平凶首問曹河間屠血肉江表戰風濤雅意存中國單師靜不毛安知深政術指畫露兵韜顧託情尤重君臣義可褒南征才解甲北伐遽投醪渭水開營壁祁山擁節旄乾坤悲拆裂荆棘誓鋤薅逺結孫權援親將仲達鏖劉宗難再起郭塢已長號家國猶殷富衣冠亦俊髦中途亡轡䇿束手類猿猱事業垂千載風流尚一陶民思夔子國廟枕蜀江臯夀史徒譏議裴碑自固牢丹青嚴壯觀松檜盡蕭騷鄰敵終為患長弓未見櫜吁嗟擒縱術祠下涕霑袍瞿塘峽勝絶瞿塘險西陵古地形巴江深洞穴蜀主舊門庭王氣吞三峽神工出五丁斜長天一線相對石雙屏瀑擊巖巒瘦雲蒸草木腥衆流趨灔澦逺意㑹滄溟顧盼如無地幽隂似有靈白鹽懸日月黑石鼓雷霆鑱鑿餘㾗在高深巨勢停魚龍慿險怪煙霧鎖沉冥念昔窮探賾嘗言駭觀聽波濤真激箭舟楫遽奔星倒掛傷猿足橫飛羡鳥翎死生期一瞬出沒類浮萍葉上慿忠信胸中混醉醒人煙逢瀼岸語笑落沙汀瀝酒重灘下回頭萬仭青停橈詢故老借筆潤圖經二孟連稱帝三川恃建瓴關防雖鞏固基業旋飄零藝祖收長䇿神旗指不寧彥疇空死節曹翰首開扄五嶺劉歸國重湖馬就刑磨崖誰刻此逺續孟陽銘東陽灘蠢䏰山窮處東陽石鬭間數傾船簸蕩萬觸水回環逰子真亡命忠臣固厚顔捨舟途入險平地幾時還施州道上遇雪易下山中雪初寒塞上途郵燈催客起澗水雜猿呼密綴林驚秀輕䝉石變枯無人來寫取十幅李成圖宿水轉寺又云封水寺在通泉縣剩壠鎮殿閣逢僧剎煙嵐㵼路隅徑深羣柏老溪轉一峰孤已到身猶聳才閒氣便蘇巗禽知客意臨曉解相呼丁卯除夜庭罷驅儺戲門收爆竹盤酒香添臘味夜氣雜春寒歲序張燈守人情遇節歡明朝五十八消息近休官安嶽集卷十
