body:
  text: 安岳集巻六宋馮山撰七言古詩青塜行郊外日暖春溶溶十里不斷人相從填填車馬上墳去踏盡青草行人蹤松柏影重楸葉開一區塚舍全家来展看酹酒聚頭哭哭盡更把松楸栽隔溪青塚高巍巍塼片露出空餘碑子孫因官徃南北温暖時節無人知虚有官階又無食舊日松楸已荆棘不及㝷常百姓家泉中却得兒孫力休休休有子莫願為公侯有孫莫令從官逰每到年年寒食節尚有一杯羮来到墳上頭鄰家婦鄰家婦一貧復一富舅姑愛憎苦不常憎貧愛富多心腸富婦初嫁時身上曄曄生輝光舅姑好財不好義婦道無復較短長不如貧婦巧且勤巧能養家勤養親君不見古來烈女傳徃徃多是貧中人鄰家婦一為烏一為鴞貧婦慈孝富婦驕俠少行山東自古多才雄輟耕隴上羞為農鄉兵名在萬選中一日聲價聞天聰十石弩力三石弓殿前野戰如飄風白錦戰袍腰勒紅詔容走馬出閶闔都人仰看如飛鴻歸来意氣人誰及道逢刺史猶長揖邯鄲白日袖劔行振武青樓乗醉入傳聞留後收蘭州姓名御筆親㸃抽府金百鎰輕一擲且向塞外隨遨逰自此鋤犂變任俠夜事椎埋晝馳獵有田無人耕有子不養家田間父老長咨嗟採樵行朝霞朦朧入林塢零星背篝腰破斧田家無田有門戸不免將身犯豺虎禽驚鹿寒木丁丁一篝數枝千萬聲嚴風裂膚催出白入澗飲水飢腸嗚縫無尺布舂無粟菜根掃葉燃難熟留柴趂市將輸官一錢不救長飢寒年年採樵樵漸少官家苗役無時了路傍柏路傍有柏千尺髙數夫連臂環周遭十里煙雲護蒼翠一天風雨寒蕭騷縱横萬蛇入土鬭扶搖千騎盤空走豈能霜雪歲寒知自有江山神物守五月炎光燒草木柏影重重似華屋徃還不擇貴與賤借與清凉解炎酷本来無情栢與人偶然相值如相親貴侯餘資萬鍾禄不到流離親骨肉前時仗節徒東歸觀望風彩爭奔馳族中俛首彈指意安用富貴摩天為誰人試從貴侯道莫從此路爭榮耀恐為路傍柏輕笑黔江黔江逺從思播来黔中五溪此其一東出涪陵與涪㑹日抱嵐光照城壁去年黔安方解纜久倦﨑嶇喜飛疾驚湍駭浪或當道萬馬奔馳兩鋒鏑偶然劃過脱重險千悔中流無路出瞿塘乗漲秋下峽猿嘯穿流夜投驛魚腹未葬身尚在虎牙屢磨魂已失巫陽一歲却歸来還向江前酒重瀝八陣磧永安宫前瀼西磧萬流峽口爭奔激秋濤巻地裂山谷水落依然陣圖出陣形聚拳六十四傳是武侯親手跡斯人管蕭豈足道身在巴東心漢室從容所遇皆法制浩蕩胸中萬分一隂機暗與天地合壯氣曾將鬼神役至今千載矻不動𣺌莽㡬深難致詰豈徒豪傑重嗟賞應有神靈長護惜廟偏裸裎七壯士酒炙紛紛走巫覡萬事顛倒皆偶然卧龍無處沾餘瀝哭景館吏立之去年四月二十七親見進之没磝盤今年二月十三日又聞立之死􅀈白身膏草野心為誰區區身後猶讒疾進之一子久乃得立之一子稱特恩死封疆臣古所重千載烈士多銜寃立之才武世少敵胸中意欲呑河湟將軍一劍義自决塞上擾擾多奔亡前功委棄不復收李蔡下士皆封侯生人欺鬼不解語天道反復終相讎昨得二月三日書猶云持重破賊鋒等閒人事祇十日使我淚落親書蹤書云董氊兵在境上終不肯捨山林而来此持重以待之凡七日矣食盡當走兒癡母老女未嫁實事無一虛名存相知抱恨寧復論誰為徃弔洮西魂答中江程建用知縣嘉陵水落沙帶霜舟師治舟還故鄉中江一别三四年人情風物俱依然故人寄我江前吟幽蘭調高無報音流水茫茫恨空㵼㑹合合江江溉下送滿夷行秀才赴太學漢唐諸儒經術淺事業不及文章多六經意義失原本次第疏鑿成江河聖朝羣公盡禹力注海一導横流波淵源太學得至寳洗出光耀猶䥴磨聖賢德業貴簡易一氣自在生中和鍼醫馬蹄鑿渾沌或恐純粹成雕訛君方茂年已知道歸渉浩𣺌登嵯峨置身爵禄慶賞外人跡斷處逢丘軻安岳集巻六
