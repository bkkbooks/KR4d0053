body:
  text: 安嶽集卷二宋馮山撰五言古詩越公堂古賢重遺愛迹與江山遙夸者恣而已事隨草木雕越公彼何人構堂壓山椒四阿無寸支千載不可搖自衒神鬼工已窮草木妖吾嘗讀素傳拊髀悲前朝無從借史册奮筆誅姦驕尚能毁兹堂立使沴氣銷灔澦堆巨石當江衝江水皆倒還夏秋水石鬭怒浪高於山長年欲下峽防石如防姦乘流一無備拳石皆險艱獨使灔澦誇千載不可刪岑公洞武龍南浦南秀拔異衆山下有嵓洞幽嵌虛隱玄關岑公江陵來一寓不復還養神脫塵滓百歲如童顔至今遺像存寂寞空幢幡老柏壯人氣清泉繞回環暫為物外逰偷向壺中間叟其靜者歟深藏厭喧煩或將避擾攘甘此石穴艱不虞身後聞敻若髙難攀萬事皆偶爾多在功名間溫湯寺溫湯氣如蒸冷泉寒於氷並流不相入洶湧爭奔騰佛廬煥金碧法地何時興二泉灑其間回環清且澄維舟愛古柏磴道垂千層殿堂絶纎埃瀟灑嚴香燈敲欄施魚食弄水搖懸藤一掬洗病眼再潄袪煩膺逺訪豈憚勞勝逰誠可矜塗山寺巴山俗可厭萬疊誇雄偉江前一峯秀青林帶孤起長舟截巨浪平輿登峻趾古寺隱山背來造神已喜清泉繞修竹野徑入葭葦女媧舊生處石坳勤戾止聖神固有合天作非偶爾玉簡事恍惚越書莽非是孤亭凌絶頂坐有千古意二江錯交會比屋聚紛蟻把酒一長笑忘情但髙視豐都觀橫江聳孤峯陟巘訪山境修廊轉空曲古殿冠絶頂漢柏撫骨立唐碑獨孤挺髙踞自軒豁遐追若俄頃長生盡室來避世或箕頴逍遙奚所適遺事傳緱嶺藥嵓已無竈煙雲但枯井風前凡幾過物外初一省清風誰與逰髙步局難騁利州漕宇八景會景亭天下臺府勝益昌囿佳山使者髙世才秀隱林樾間仰山復仰人昔旅無由攀辟書就始志來若逰子還史公實賓從與脫簿領艱會景駕峯出碧玉森周環棟梁宿雲霧欄檻平江關杖屨從公逰蕭散萬慮間酒隨至樂盡詩到無疵刪經年若朝夕語去涕欲澘屬余省親闈看公趣天顔此會不可再鴻鵠方髙翾八詠風迹存二江聲潺潺巽堂燕嬉各異處君子時以居虛堂背治開面直東南隅林巒照几席花木紛庭除委蛇外不煩浩蕩中有餘雄雄臺府間寂若山中廬美景開宴觴清談會賓裾孰窮吏隱趣但見民情舒鄙夫不知要僕僕困簿書桐軒幽軒處清奧前有雙桐起婆娑勢初合修聳意未已葉分竹嵓路根漬石沼水秋聲動素琴曉影覆齋几主人相對樂性靜窮物理純音藏未兆孤幹直不倚安得千仭禽來哉共棲止柏軒昔時柏未栽榜杏為軒名柏今已可愛題柏軒始清賢者安厥居中懷渺無營日來對柏坐心適眼自明草經謝今説寄意遺俗聲落落守歲寒常恐為柏輕竹軒翠筠清人心愈少愈可愛風騷靜中得一室處以泰北軒隱吟几復與此君對泯默追古意蕭森散秋籟淡薄世鮮味俯仰誰與會七賢非吾徒心猶有名在山齋層層梯巉巖步步出杳茫何人破峯臆碧瓦臨疏篁聊休邈回睇人物分毫芒惟見臺府雄三軒鬱相望不知身從來但覺凌空翔窮髙自兹始寶峯磨蒼蒼間宴亭徹頂造間宴據欄俯山齋軒忩蔽修竹磴道懸蒼崖登臨快雙目應接煩虛懷羣峯病擁閼次第隨天開物色無定姿變化紛難裁髙吟絶儔侣但擕清樽偕物理醉可一逍遙付齊諧寶峯亭益昌萬山間寶峯秀惟獨使臺俯山下氣象互盤覆鬱勃尚南走回環已西屬古城削千仭危棧轉幾曲錦繡紛上領琅玕翠搖腹亭榭何參差逺覽意尚局絶頂躋石峯超然脫羈束城市裁唾落二江可手掬重開固天險大道不停轂古意劇滿眼人事傷轉足主人始經搆髙蹈非絶俗幽懷卷雲霧長笑動巖谷鳥雀爭脫林冥冥有鴻鵠寸步異出處虛心見榮辱屈將經濟才分繼騷雅躅語默固可傳誰為寶峯録中林道上中林山谷間出沒緣畏途楩楠蔽白日落落梁棟軀半為野火燒摧頺委樵蘇清泉勞奔注亦為勢所驅微芒濟物心到海何其迃吾物處其一進退難與俱置身木鴈間恐非斯人徒西縣道中漢水引我行梁山邀我坐山水已清絶春容碧相和下馬取酒飲梅飄酒中墮日落醉不去青茸草間卧巴子臺忠州早渡鳴玉橋竟登巴子臺雲林擁磅礴磴道窮縈回古寺不足觀猶有南軒開浩蕩橫深溝逶迤環覆杯古人去我逺萬事隨塵埃赤穴何渺茫青山但崔嵬聞名不知實此意空悠哉乍到輒復還石滑倦去來苟能厭耳目未免勞筋骸安嶽集卷二
