body:
  text: 安岳集巻五宋馮山撰五言古詩謝梓漕李琮獻甫寄餘甘戎南煙瘴地草木富嘉實名菓葢數品餘甘乃其一爛漫經暑雨駢繁向秋日顆肥櫻綴圓膚嫩李帶碧始嘗猶餘木酸澀固可斥稍味復土性華池變瓊液冷冽祛酒毒香芬破茶癖豈徒雜肴核自可名藥石東蜀部刺史江南夸聲蹟道與荆公合詩為梅老敵邉機屬未靖使指煩逺適絶塞偶相值慇懃為珍惜殘菊雅趣尚啖薤清讌逸分甘病漳守筠筒手封羃三年官大道襟抱塵土積語言變為市風騷蕩無迹開封命澡雪一食至六七氷霜快口吻塵坌併䟽滌古意還五臟清風生兩腋與公始邂逅一言甚疇昔生芻感厚意香草慕前述人道成以友直諒久無斁磨厲出鋒刄切磋至圭璧諍友本仁義拂士忘疹疾或矯有所正或投有所激始逆濟以順始疏要以宻物微可以興騷雅固採摭公行浩河漢闕効畎澮益不為小人腹俗茹飫梨栗不作兒女口甘滋事餂蜜庶幾功名㑹或在交際出相知雖意喻欲報粗言息追繼橄欖篇慙無翰林筆送李獻甫知吉州六經出晩周日月懸太虛幾蝕復幾明微茫炎漢初清識隠虚粹髙風激貪懦翩翩起江湖泛泛雜鳬鴈發揚始使蜀奔走非素願郎官雖内遷相去才一間朝廷訪耆艾人物尚清簡騫騰自兹始寧慮歲月晏區區無足道鄉社久息偃未契許投合相濡念孤蹇迅翮舉莫追窘歩行輙踠把酒難一徃開琴試重援别鶴如可彈新聲謝悽婉送上官基察推同年我蜀君閩中相去萬里餘同年皆白頭此别當何如君行久或抳一出無停車相忘豈人情時寄西南書送夔漕王宗望蟠叟大夫赴闕君子不苟然每以中道居處身㮣有常為吏形其餘太原大夫公使蜀元豐初蜩螗沸清晝交道狼與狙公時於其間素藴唯所攄紛擾目不瞬開濟心自如蜀人恃以安至今芬名譽更駕漕三峽應手民瘼除適逢惠澤新禁網濶且疎攫噬化為麟奔馳不能車公無異他日法度方得梳均齊即人心簡易平徭書天邊促嚴召歲晚巾歸輿老成坐廟堂收實攘浮虛有常豈易得得見將已歟行看歩臺省自可風簮裾非才共封略况舊逰門閭贈行期有知知公當知予和利漕徐師旦之才文龍山水之秀臘雪洗頑碧晴鳬浴澄􅱙物色互磨錯清輝深不變滄浪與少室幽人罕兼見少憩託高懷囘頭簿書倦題范亦顔聖鄰同年集後聖鄰生西南豪傑如山東倜儻負竒節脱身起蒿蓬文章學西漢不作雕篆工東京太學生議論傾羣公髙適逰大梁馬周隠新豐酒酣吐素蜺意氣横煙空翻身落州縣束手如兒童無人解秋隼磨天看飛冲黄鶴垂兩翅飲啄雞鶩籠始知命使然甘作𠖇𠖇終資陽數尺墳萬事隨秋風相從嘉祐初擊發每兒䝉死生雖云異坎坷略已同然猶有子棄孤芳秀珍叢慷慨悲父書收拾塵土中蘭山四百首玉佩清玲瓏餘文隠圭璧夜氣如長虹古人身後名乃是不世功蜀士志不朽存者唯卿雄有子兼斯名昔否今始通聊書附篇末相與傳無窮愛石堂并序熙寧八年七月安岳馮山允南至梓始踰月出箧中文字筆硯求置閒燕處得愛石堂乃前倅府事秘書丞嘉陽李堯俞所建而石無有也訪之得雙石筍於北垣下叢條隂翳中上有王舍人克真八分書鄭祠部文寳玉箸篆皆自冩其銘記與詩也拂拭洗剔復歸於堂之中庭屋以版環以苦竹每公退次第取書巻略略讀誦倦則撫石看王鄭字法清風蕭然古氣襲人既而又得李記於西廡下噫竒石古字葢無事於世俗之用雖時或見賞而廢棄常多豈物理固然耶因係之以詩刻於李之碑隂雙石非梓石厥初置者誰埋没不知歲復有賢者知王分逼漢邕鄭篆源秦斯今人竟未及墨本收清竒文字相稱古銘記兼以詩鐵畫隠石骨鬰屈蟠蛟螭李丞嗜竒古見石喜且悲眈眈建華屋落落刋豐碑爾来三十年堂在石已移幸未仆作橋上有車馬馳缺折從瓦礫疊為垣墻基一見叢篠間若與平生期清泉去塵垢始露金玉姿殷勤還兹堂如母逢厥兒對以古書巻環以秋竹枝勝舍結高義出處相與隨夷齊秉達節顛沛不少虧豈事燕處玩可為終身規嗟嗟石何有三賞百見欺好惡凡在人顯晦若有時官滿當捨去棄置無復疑聊書告神物為我當護持送二十二舎弟赴金堂簿丹巴中倦奔走歲暮增慘戚瞻望幾奮飛那能季行役距家才十舍身苦萬里適臨老如别何相看數歸日安岳集巻五
